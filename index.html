<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ta · 灵犀对话</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg-body: #f8f5fc;
            --chat-bg: #f8f5fc;
            --bubble-me: #f0e7ff;
            --bubble-meng: #ffffff;
            --text-primary: #1a1628;
            --text-secondary: #6b5e7a;
            --text-tertiary: #9a8eab;
            --input-bg: #ffffff;
            --border-light: rgba(140, 120, 180, 0.15);
            --header-bg: rgba(255, 255, 255, 0.25);
            --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.04);
            --card-bg: rgba(255, 255, 255, 0.25);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
            --accent-color: #8b6fcc;
            --accent-light: rgba(139, 111, 204, 0.1);
            --danger-color: #ff6b6b;
            --danger-bg: rgba(255, 80, 80, 0.15);
            --bubble-me-shadow: 0 1px 6px rgba(139, 111, 204, 0.12);
            --bubble-meng-shadow: 0 1px 4px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.04);
            --bubble-font-size: 18px;
            --accent-glow: rgba(139, 111, 204, 0.25);
            --letter-paper-bg: #fffdf7;
        }

        body[data-theme="night"] {
            --bg-body: #100e18;
            --chat-bg: #1a1624;
            --bubble-me: #3e2e5c;

            --card-bg: rgba(42, 36, 56, 0.25);
            --accent-color: #b89ff0;
            --accent-light: rgba(184, 159, 240, 0.12);
            --bubble-me-shadow: 0 1px 8px rgba(100, 70, 160, 0.2);
            --bubble-meng-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
            --accent-glow: rgba(184, 159, 240, 0.3);
            --letter-paper-bg: #1e1b2b;
        }
        body[data-theme="night"][data-theme-color="c1"] {
            --bubble-me: #4e3c6b;

        }
        body[data-theme="night"][data-theme-color="c2"] {

        body[data-theme="night"][data-theme-color="c4"] {

        }
        body[data-theme="night"][data-theme-color="c5"] {

        body[data-theme="sunset"] {

        body[data-theme="mint"] {

        body[data-theme="lavender"] {

        body[data-theme="ocean"] {
            --bg-body: #f0f5fa;

            --border-light: rgba(100, 160, 220, 0.18);
            --header-bg: rgba(249, 252, 255, 0.25);
            --shadow-sm: 0 1px 4px rgba(40, 100, 160, 0.06);

            --danger-bg: rgba(255, 80, 80, 0.15);
        }
        body[data-theme="rose"] {
            --bg-body: #fbf5f5;
            --chat-bg: #fef8f8;
            --bubble-me: #ffe0e5;
            --bubble-meng: #ffffff;
            --text-primary: #3b1e23;
            --text-secondary: #8f5b63;

            --input-bg: #fffafa;
            --border-light: rgba(220, 140, 150, 0.18);
            --header-bg: rgba(255, 250, 250, 0.25);
            --shadow-sm: 0 1px 4px rgba(160, 80, 90, 0.06);
            --card-bg: rgba(255, 250, 250, 0.25);
            --accent-color: #d4818b;
            --accent-light: rgba(212, 129, 139, 0.1);
            --bubble-me-shadow: 0 1px 8px rgba(180, 100, 110, 0.12);
            --bubble-meng-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
            --accent-glow: rgba(212, 129, 139, 0.25);
            --danger-bg: rgba(255, 80, 80, 0.15);
        }
        body[data-theme="forest"] {
            --bg-body: #f2f7f2;
            --chat-bg: #f5faf5;
            --bubble-me: #d4e8d4;
            --bubble-meng: #ffffff;
            --text-primary: #1b2e1b;
            --text-secondary: #4a6e4a;
            --text-tertiary: #739a73;
            --input-bg: #f8fdf8;
            --border-light: rgba(100, 180, 120, 0.18);
            --header-bg: rgba(248, 253, 248, 0.25);
            --shadow-sm: 0 1px 4px rgba(60, 130, 80, 0.06);
            --card-bg: rgba(248, 253, 248, 0.25);
            --accent-color: #6eaa6e;
            --accent-light: rgba(110, 170, 110, 0.1);
            --bubble-me-shadow: 0 1px 8px rgba(80, 150, 80, 0.12);

        }
        body[data-theme="honey"] {
            --bg-body: #fffaf2;
            --chat-bg: #fffcf5;
            --bubble-me: #fef1d8;
            --bubble-meng: #ffffff;
            --text-primary: #3d2e0b;
            --text-secondary: #8c6b2e;
            --text-tertiary: #b5954a;
            --input-bg: #fffef8;
            --border-light: rgba(250, 199, 94, 0.25);
            --header-bg: rgba(255, 254, 248, 0.25);
            --shadow-sm: 0 1px 4px rgba(200, 150, 50, 0.08);
            --card-bg: rgba(255, 254, 248, 0.25);
            --accent-color: #FAC75E;
            --accent-light: rgba(250, 199, 94, 0.12);
            --bubble-me-shadow: 0 1px 8px rgba(220, 160, 60, 0.15);
            --bubble-meng-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
            --accent-glow: rgba(250, 199, 94, 0.35);
            --danger-bg: rgba(255, 80, 80, 0.15);
        }

        body[data-theme-color="c1"] {
            --bubble-me: #f0e7ff;
            --bubble-meng: #ffffff;
        }
        body[data-theme-color="c2"] {
            --bubble-me: #ffe6f0;
            --bubble-meng: #fff5fb;
        }
        body[data-theme-color="c3"] {
            --bubble-me: #d8edff;
            --bubble-meng: #f7fcff;
        }
        body[data-theme-color="c4"] {
            --bubble-me: #ddd0ff;
            --bubble-meng: #f4f0ff;
        }
        body[data-theme-color="c5"] {
            --bubble-me: #ffe9cc;
            --bubble-meng: #fff9f2;
        }
        body[data-theme-color="c6"] {
            --bubble-me: #c2f5e8;
            --bubble-meng: #f2fffc;
        }
        body[data-theme-color="c7"] {
            --bubble-me: #ffd4c2;
            --bubble-meng: #fff5f2;
        }
        body[data-avatar-shape="circle"] .avatar-img,
        body[data-avatar-shape="circle"] .msg-avatar img,
        body[data-avatar-shape="circle"] .member-avatar-wrap img,
        body[data-avatar-shape="circle"] .call-avatar-img,
        body[data-avatar-shape="circle"] .moment-header img,
        body[data-avatar-shape="circle"] .preview-avatar {
            border-radius: 50% !important;
        }
        body[data-avatar-shape="rounded-square"] .avatar-img,
        body[data-avatar-shape="rounded-square"] .msg-avatar img,
        body[data-avatar-shape="rounded-square"] .member-avatar-wrap img,
        body[data-avatar-shape="rounded-square"] .call-avatar-img,
        body[data-avatar-shape="rounded-square"] .moment-header img,
        body[data-avatar-shape="rounded-square"] .preview-avatar {
            border-radius: 20% !important;
        }
        body[data-avatar-shape="square"] .avatar-img,
        body[data-avatar-shape="square"] .msg-avatar img,
        body[data-avatar-shape="square"] .member-avatar-wrap img,
        body[data-avatar-shape="square"] .call-avatar-img,
        body[data-avatar-shape="square"] .moment-header img,
        body[data-avatar-shape="square"] .preview-avatar {
            border-radius: 0 !important;
        }
        body[data-avatar-shape="circle"] .call-avatar-ring {
            border-radius: 50% !important;
        }
        body[data-avatar-shape="rounded-square"] .call-avatar-ring {
            border-radius: 20% !important;
        }
        body[data-avatar-shape="square"] .call-avatar-ring {
            border-radius: 0% !important;
        }
        body[data-bubble-radius] .bubble {
            border-radius: var(--bubble-radius, 20px) !important;
        }
        body[data-bubble-radius] .typing-indicator {
            border-radius: var(--bubble-radius, 20px) !important;
        }
        body[data-bubble-radius] .call-system-msg-inner {
            border-radius: calc(var(--bubble-radius, 20px) * 1.2) !important;
        }
        .preview-message-row {
            display: flex;
            gap: 10px;
            margin: 12px 0;
            align-items: flex-start;
        }
        .preview-bubble {
            padding: 8px 14px;
            background: var(--bubble-meng);
            color: var(--text-primary);
            max-width: 70%;
            border-radius: var(--bubble-radius, 20px);
        }
        .preview-message-row.me .preview-bubble {
            background: var(--bubble-me);
        }
        .preview-avatar {
            width: 36px;
            height: 36px;
            object-fit: cover;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            background-color: var(--bg-body);
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ========== 通话覆盖层样式 ========== */
        .call-overlay {
            position: fixed;
            inset: 0;
            z-index: 1100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
            animation: callFadeIn 0.3s ease;
        }
        .call-overlay.closing {
            animation: callFadeOut 0.35s ease forwards;
        }
        @keyframes callFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes callFadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }
        .call-overlay .call-bg-glow {
            position: absolute;
            inset: 0;
            overflow: hidden;
            opacity: 0.25;
            pointer-events: none;
        }
        .call-overlay .call-bg-glow .glow-1 {
            position: absolute;
            top: 25%;
            left: 25%;
            width: 256px;
            height: 256px;
            border-radius: 50%;
            background: var(--accent-color);
            filter: blur(96px);
        }
        .call-overlay .call-bg-glow .glow-2 {
            position: absolute;
            bottom: 33%;
            right: 33%;
            width: 192px;
            height: 192px;
            border-radius: 50%;
            background: #f472b6;
            filter: blur(96px);
        }
        .call-overlay .call-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 0 24px;
        }
        .call-status-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 24px;
            letter-spacing: 0.05em;
            font-weight: 500;
        }
        .call-timer-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 24px;
            letter-spacing: 0.05em;
            font-family: monospace;
        }
        .call-avatar-area {
            position: relative;
            margin-bottom: 24px;
        }
        .call-avatar-ring {
            border-radius: 50%;
            padding: 6px;
            background: rgba(255, 255, 255, 0.1);
        }
        .call-avatar-ring-pulse {
            animation: callPulse 2s ease-in-out infinite;
        }
        .call-avatar-ring-connected {
            animation: callPulseConnected 3s ease-in-out infinite;
        }
        @keyframes callPulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.5), 0 0 0 8px rgba(255, 255, 255, 0.08);
            }
            50% {
                box-shadow: 0 0 0 14px rgba(255, 255, 255, 0), 0 0 0 24px rgba(255, 255, 255, 0);
            }
        }
        @keyframes callPulseConnected {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.25), 0 0 0 4px rgba(255, 255, 255, 0.04);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(255, 255, 255, 0), 0 0 0 14px rgba(255, 255, 255, 0);
            }
        }
        .call-avatar-img {
            width: 112px;
            height: 112px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }
        .call-video-area {
            display: none;
            position: relative;
            width: 100%;
            max-width: 320px;
            aspect-ratio: 3/4;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
            background: #0a0a14;
            animation: videoBgShift 6s ease-in-out infinite;
        }
        @keyframes videoBgShift {
            0%,
            100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.02) translate(-0.5%, -0.5%);
            }
            50% {
                transform: scale(1.01) translate(0.5%, 1%);
            }
            75% {
                transform: scale(1.03) translate(1%, -0.5%);
            }
        }
        .call-video-bg-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }
        .call-self-cam {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 80px;
            height: 112px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            animation: selfCamIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes selfCamIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .call-self-cam-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .call-name-text {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: 0.02em;
        }
        .call-wave-bars {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            margin: 12px 0;
            height: 32px;
        }
        .call-wave-bar {
            animation: waveAnim 0.9s ease-in-out infinite;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.85);
            width: 3px;
            display: inline-block;
        }
        .call-wave-bar:nth-child(1) {
            animation-delay: 0s;
            height: 10px;
        }
        .call-wave-bar:nth-child(2) {
            animation-delay: 0.1s;
            height: 18px;
        }
        .call-wave-bar:nth-child(3) {
            animation-delay: 0.2s;
            height: 26px;
        }
        .call-wave-bar:nth-child(4) {
            animation-delay: 0.3s;
            height: 20px;
        }
        .call-wave-bar:nth-child(5) {
            animation-delay: 0.4s;
            height: 12px;
        }
        .call-wave-bar:nth-child(6) {
            animation-delay: 0.5s;
            height: 6px;
        }
        @keyframes waveAnim {
            0%,
            100% {
                transform: scaleY(0.5);
                opacity: 0.5;
            }
            50% {
                transform: scaleY(1.3);
                opacity: 1;
            }
        }
        .call-actions-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .call-action-btn {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            cursor: pointer;
            color: #fff;
            font-size: 20px;
            transition: all 0.2s;
        }
        .call-action-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.25);
        }
        .call-answer-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #10b981;
            border: none;
            cursor: pointer;
            color: #fff;
            font-size: 24px;
            box-shadow: 0 0 24px rgba(16, 185, 129, 0.4);
            transition: all 0.2s;
        }
        .call-answer-btn:active {
            transform: scale(0.9);
        }
        .call-hangup-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--danger-color);
            border: none;
            cursor: pointer;
            color: #fff;
            font-size: 24px;
            box-shadow: 0 0 24px rgba(255, 107, 107, 0.3);
            transition: all 0.2s;
        }
        .call-hangup-btn:active {
            transform: scale(0.9);
        }
        .call-hangup-btn i {
            transform: rotate(135deg);
        }
        .call-redial-btn {
            margin-top: 16px;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            cursor: pointer;
            color: #fff;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
        }
        .call-redial-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);

        /* ========== 输入栏通话按钮样式 ========== */
        .call-input-btn {

        .call-input-btn.call-active {

        #splashOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #f5edff 0%, #e8d5f8 15%, #dcc8f2 30%, #ede0f9 50%, #f3e8fc 65%, #e5d2f6 80%, #f0e3fa 100%);
            background-size: 400% 400%;
            animation: splashBgShift 12s ease-in-out infinite;
            overflow: hidden;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: opacity, transform;
        }
        #splashOverlay.exit {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }
        #splashOverlay.hidden-splash {
            display: none;
        }
        @keyframes splashBgShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 100% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            75% {
                background-position: 0% 100%;
            }
        }
        .splash-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            background: rgba(180, 140, 220, 0.7);
            box-shadow: 0 0 6px rgba(180, 140, 220, 0.5), 0 0 14px rgba(200, 160, 235, 0.35);
            animation: particleFloat linear infinite;
            will-change: transform, opacity;
        }
        @keyframes particleFloat {
            0% {
                transform: translateY(105vh) translateX(0) scale(0.3);
                opacity: 0;
            }
            8% {
                opacity: 0.9;
            }
            40% {
                opacity: 0.7;
                transform: translateY(40vh) translateX(30px) scale(1);
            }
            70% {
                opacity: 0.35;
                transform: translateY(-10vh) translateX(-20px) scale(0.6);
            }
            100% {
                transform: translateY(-30vh) translateX(15px) scale(0.15);
                opacity: 0;
            }
        }
        .wheel-of-fate {
            position: relative;
            width: 200px;
            height: 200px;
            flex-shrink: 0;
            z-index: 2;
            margin-bottom: 8px;
        }
        .wheel-ring-outer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(150, 110, 195, 0.55);
            box-shadow: 0 0 28px rgba(160, 120, 210, 0.4), 0 0 60px rgba(180, 140, 225, 0.22), inset 0 0 20px rgba(170, 130, 215, 0.1);
            animation: ringRotateCW 10s linear infinite;
        }
        .wheel-ring-middle {
            position: absolute;
            top: 22px;
            left: 22px;
            width: calc(100% - 44px);
            height: calc(100% - 44px);
            border-radius: 50%;
            border: 2.5px dashed rgba(170, 130, 210, 0.5);
            box-shadow: 0 0 18px rgba(170, 130, 215, 0.3);
            animation: ringRotateCCW 7s linear infinite;
        }
        .wheel-ring-inner {
            position: absolute;
            top: 48px;
            left: 48px;
            width: calc(100% - 96px);
            height: calc(100% - 96px);
            border-radius: 50%;
            border: 2px solid rgba(190, 150, 225, 0.6);
            box-shadow: 0 0 22px rgba(185, 145, 220, 0.5), 0 0 40px rgba(195, 155, 230, 0.25);
            animation: ringRotateCW 4.5s linear infinite;
        }
        .wheel-cross {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 90px;
            height: 90px;
            transform: translate(-50%, -50%);
            animation: crossRotate 20s linear infinite;
            pointer-events: none;
        }
        .wheel-cross::before,
        .wheel-cross::after {
            content: '';
            position: absolute;
            background: rgba(195, 155, 230, 0.5);
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(195, 155, 230, 0.6);
        }
        .wheel-cross::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            transform: translateY(-50%);
        }
        .wheel-cross::after {
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
        }
        .wheel-core {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #e8d4f8 30%, #c8a8e8 70%, transparent 100%);
            box-shadow: 0 0 18px rgba(210, 170, 240, 0.9), 0 0 40px rgba(190, 150, 220, 0.55), 0 0 70px rgba(170, 130, 210, 0.3);
            animation: corePulse 2.5s ease-in-out infinite;
            z-index: 3;
        }
        @keyframes ringRotateCW {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes ringRotateCCW {
            from {
                transform: rotate(360deg);
            }
            to {
                transform: rotate(0deg);
            }
        }
        @keyframes crossRotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
        @keyframes corePulse {
            0%,
            100% {
                box-shadow: 0 0 18px rgba(210, 170, 240, 0.9), 0 0 40px rgba(190, 150, 220, 0.55), 0 0 70px rgba(170, 130, 210, 0.3);
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                box-shadow: 0 0 28px rgba(220, 185, 248, 1), 0 0 55px rgba(200, 160, 230, 0.7), 0 0 90px rgba(180, 140, 220, 0.45);
                transform: translate(-50%, -50%) scale(1.25);
            }
        }
        .orbit-dot {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(210, 175, 235, 0.85);
            box-shadow: 0 0 8px rgba(200, 160, 230, 0.7);
            pointer-events: none;
        }
        .orbit-dot:nth-child(1) {
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            animation: dotBlink1 3s ease-in-out infinite;
        }
        .orbit-dot:nth-child(2) {
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            animation: dotBlink2 3.5s ease-in-out infinite;
        }
        .orbit-dot:nth-child(3) {
            top: 50%;
            right: 6px;
            transform: translateY(-50%);
            animation: dotBlink3 4s ease-in-out infinite;
        }
        .orbit-dot:nth-child(4) {
            top: 50%;
            left: 6px;
            transform: translateY(-50%);
            animation: dotBlink4 3.2s ease-in-out infinite;
        }
        .orbit-dot:nth-child(5) {
            top: 18px;
            right: 22px;
            animation: dotBlink1 3.8s ease-in-out infinite;
        }
        .orbit-dot:nth-child(6) {
            bottom: 18px;
            left: 22px;
            animation: dotBlink2 4.2s ease-in-out infinite;
        }
        .orbit-dot:nth-child(7) {
            top: 18px;
            left: 22px;
            animation: dotBlink3 3.4s ease-in-out infinite;
        }
        .orbit-dot:nth-child(8) {
            bottom: 18px;
            right: 22px;
            animation: dotBlink4 3.9s ease-in-out infinite;
        }
        @keyframes dotBlink1 {
            0%,
            100% {
                opacity: 0.5;
                transform: translateX(-50%) scale(0.8);
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) scale(1.5);
            }
        }
        @keyframes dotBlink2 {
            0%,
            100% {
                opacity: 0.6;
                transform: translateX(-50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) scale(1.6);
            }
        }
        @keyframes dotBlink3 {
            0%,
            100% {
                opacity: 0.45;
                transform: translateY(-50%) scale(0.7);
            }
            50% {
                opacity: 1;
                transform: translateY(-50%) scale(1.4);
            }
        }
        @keyframes dotBlink4 {
            0%,
            100% {
                opacity: 0.55;
                transform: translateY(-50%) scale(0.9);
            }
            50% {
                opacity: 1;
                transform: translateY(-50%) scale(1.5);
            }
        }
        .waves-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;

        .wave {

        @keyframes waveDrift {

        .splash-title {

        .splash-btn {

    <script>
        (function() {
            const IMG_DB_NAME = 'xiayi_img_db';
            const IMG_DB_VERSION = 1;
            const IMG_STORE_NAME = 'images';
            const IMG_ID_PREFIX = '__IMG_ID__';

            function openImgDB() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(IMG_DB_NAME, IMG_DB_VERSION);
                    req.onupgradeneeded = e => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(IMG_STORE_NAME)) {
                            db.createObjectStore(IMG_STORE_NAME, { keyPath: 'id' });
                        }
                    };
                    req.onsuccess = e => resolve(e.target.result);
                    req.onerror = e => reject(e.target.error);
                });
            }
            async function saveImageToDB(id, base64) {
                if (!base64 || typeof base64 !== 'string') return;
                if (!base64.startsWith('data:') && !base64.startsWith('__IMG_ID__')) return;
                let blob;
                if (base64.startsWith('data:')) {
                    const parts = base64.split(',');
                    const mime = parts[0].match(/:(.*?);/)?.[1] || 'image/png';
                    const binary = atob(parts[1]);
                    const ab = new ArrayBuffer(binary.length);
                    const ia = new Uint8Array(ab);
                    for (let i = 0; i < binary.length; i++) ia[i] = binary.charCodeAt(i);
                    blob = new Blob([ab], { type: mime });
                } else { blob = base64; }
                const db = await openImgDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(IMG_STORE_NAME, 'readwrite');
                    tx.objectStore(IMG_STORE_NAME).put({ id, blob });
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            }
            async function getImageFromDB(id) {
                const db = await openImgDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(IMG_STORE_NAME, 'readonly');
                    const req = tx.objectStore(IMG_STORE_NAME).get(id);
                    req.onsuccess = () => {
                        const record = req.result;
                        if (!record) return resolve('');
                        if (record.blob instanceof Blob) {
                            const reader = new FileReader();
                            reader.onloadend = () => resolve(reader.result);
                            reader.onerror = () => resolve('');
                            reader.readAsDataURL(record.blob);
                        } else if (record.base64) {
                            resolve(record.base64);
                        } else { resolve(''); }
                    };
                    req.onerror = () => resolve('');
                });
            }
            
            async function deleteImageFromDB(id) {
                const db = await openImgDB();
                return new Promise(resolve => {
                    const tx = db.transaction(IMG_STORE_NAME, 'readwrite');
                    tx.objectStore(IMG_STORE_NAME).delete(id);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => resolve();
                });
            }

            async function deleteMessageFromChat(msgId) {
                const msg = messages.find(m => m.id == msgId);
                if (msg) {
                    if (msg.type === 'image' && isImgIdRef(msg.content)) {
                        const imgId = extractImgId(msg.content);
                        const usedInOtherMessages = messages.some(m => m.id != msgId && m.type === 'image' && extractImgId(m
                            .content) === imgId);
                        const usedInImgCards = imgCardList.some(card => extractImgId(card.url) === imgId);
                        const customBg = localStorage.getItem(STORAGE.customBgImage);
                        const usedInBg = (customBg && extractImgId(customBg) === imgId);
                        const usedInMengAvatar = (profile.mengAvatar && extractImgId(profile.mengAvatar) === imgId);
                        const usedInMyAvatar = (profile.myAvatar && extractImgId(profile.myAvatar) === imgId);
                        const usedInMemberAvatar = groupMembers.some(m => m.avatar && extractImgId(m.avatar) === imgId);
                        const usedInMoments = moments.some(m => 
                            m.images && m.images.some(img => extractImgId(img) === imgId)
                        );
                        if (!usedInOtherMessages && !usedInImgCards && !usedInBg && !usedInMengAvatar && !usedInMyAvatar && !usedInMemberAvatar && !usedInMoments) {
                            await deleteImageFromDB(imgId);
                        }
                    }
                    messages = messages.filter(m => m.id != msgId);
                    saveMessagesImmediately();
                    renderMessages();
                }
            }
            async function clearAllMessagesSafe() {
                const imgRefCount = new Map();
                for (const msg of messages) {
                    if (msg.type === 'image' && isImgIdRef(msg.content)) {
                        const id = extractImgId(msg.content);
                        imgRefCount.set(id, (imgRefCount.get(id) || 0) + 1);
                    }
                }
            
                for (const [imgId, count] of imgRefCount.entries()) {
                    const usedInImgCards = imgCardList.some(card => extractImgId(card.url) === imgId);
                    const customBg = localStorage.getItem(STORAGE.customBgImage);
                    const usedInBg = (customBg && extractImgId(customBg) === imgId);
                    const usedInMengAvatar = (profile.mengAvatar && extractImgId(profile.mengAvatar) === imgId);
                    const usedInMyAvatar = (profile.myAvatar && extractImgId(profile.myAvatar) === imgId);
                    const usedInMemberAvatar = groupMembers.some(m => m.avatar && extractImgId(m.avatar) === imgId);
                    const usedInMoments = moments.some(m =>
                        m.images && m.images.some(img => extractImgId(img) === imgId)
                    );
            
                    if (!usedInImgCards && !usedInBg && !usedInMengAvatar && !usedInMyAvatar && !usedInMemberAvatar && !usedInMoments) {
                        await deleteImageFromDB(imgId);
                    }
                }
            
              
                messages = [];
                saveMessagesImmediately();
                renderMessages();
            }
            function isImgIdRef(url) { return url && typeof url === 'string' && url.startsWith(IMG_ID_PREFIX); }

            function extractImgId(url) { return isImgIdRef(url) ? url.substring(IMG_ID_PREFIX.length) : null; }
            async function resolveImageUrl(url) {
                if (isImgIdRef(url)) {
                    const id = extractImgId(url);
                    if (avatarCache.has(url)) return avatarCache.get(url);
                    const base64 = await getImageFromDB(id);
                    if (base64) { avatarCache.set(url, base64); return base64; }
                    return '';
                }
                return url;
            }
            async function loadImgElement(imgEl, url) {
                if (!imgEl || !url) return;
                const realSrc = await resolveImageUrl(url);
                if (realSrc && imgEl.src !== realSrc) { imgEl.src = realSrc;
                    imgEl.classList.remove('img-loading-placeholder'); }
            }
            let imageObserver = null;

            function setupLazyImageObserver() {
                if ('IntersectionObserver' in window) {
                    imageObserver = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                const img = entry.target;
                                const ref = img.getAttribute('data-img-ref');
                                if (ref) { loadImgElement(img, ref).then(() => { img.removeAttribute(
                                    'data-img-ref'); }); }
                                imageObserver.unobserve(img);
                            }
                        });
                    }, { rootMargin: '200px' });
                }
            }
            async function resolveImgElementsInContainer(container) {
                if (!container) return;
                const imgs = container.querySelectorAll('img[data-img-ref]');
                for (const img of imgs) {
                    if (imageObserver) { imageObserver.observe(img); } else { const ref = img.getAttribute('data-img-ref'); if (
                            ref) await loadImgElement(img, ref); }
                }
            }
            function makeImgId() { return 'IMG_' + Date.now() + '_' + Math.random().toString(36).substring(2, 10); }
            async function compressImage(base64, maxWidth = 1024, quality = 0.8) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        let width = img.width,
                            height = img.height;
                        if (width > maxWidth) { height = Math.round((height * maxWidth) / width);
                            width = maxWidth; }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressed = canvas.toDataURL('image/jpeg', quality);
                        resolve(compressed);
                    };
                    img.src = base64;
                });
            }

            function formatMsgTime(timestamp) {
                const d = new Date(timestamp);
                if (isNaN(d.getTime())) return '';
                const hh = d.getHours().toString().padStart(2, '0');
                const mm = d.getMinutes().toString().padStart(2, '0');
                const mon = (d.getMonth() + 1).toString().padStart(2, '0');
                const dd = d.getDate().toString().padStart(2, '0');
                const today = new Date();
                const msgDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
                const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
                const diffDays = Math.floor((todayDate - msgDate) / (1000 * 60 * 60 * 24));
                if (diffDays === 0) return `${hh}:${mm}`;
                if (diffDays === 1) return `昨天 ${hh}:${mm}`;
                if (diffDays < 7) return `${diffDays}天前 ${hh}:${mm}`;
                return `${mon}-${dd} ${hh}:${mm}`;
            }

            function getMemberEffectiveTextPool(member) {
              const memberGroups = getMemberGroupsConfig(member.id);
              const globalGroups = getGlobalGroupsConfig();
              
              if (member.useGlobalWordCards === false) {
                let cards = (member.wordCardList && member.wordCardList.length > 0) 
                  ? member.wordCardList 
                  : (wordCardList.length > 0 ? wordCardList : []);
                if (member.wordCardList && member.wordCardList.length > 0) {

                return cards;

              let memberCards = member.wordCardList || [];
              let globalCards = wordCardList || [];
              
              memberCards = filterEnabledCards(memberCards, memberGroups);
              globalCards = filterEnabledCards(globalCards, globalGroups);
              
              const combined = [...memberCards, ...globalCards];
              const unique = [];
              const set = new Set();
              for (const text of combined) {
                if (!set.has(text)) {
                  set.add(text);
                  unique.push(text);
                }
              }
              return unique;

            async function showImageOverlay(src) {
                const existing = document.querySelector('.image-overlay');
                if (existing) existing.remove();
            
                const overlay = document.createElement('div');
                overlay.className = 'image-overlay';
                overlay.style.cssText = `
                    position:fixed;
                    inset:0;
                    background:rgba(0,0,0,0.9);
                    display:flex;
                    justify-content:center;
                    align-items:center;
                    z-index:9999;
                    cursor:zoom-out;
                `;
            
                const loader = document.createElement('div');
                loader.style.color = '#fff';
                loader.style.fontSize = '20px';
                loader.innerText = '加载中...';
                overlay.appendChild(loader);
                document.body.appendChild(overlay);
            
                try {
                    let realUrl = src;
                    if (typeof isImgIdRef === 'function' && isImgIdRef(src)) {
                        realUrl = await resolveImageUrl(src);
                        if (!realUrl) throw new Error('无法解析图片');
                    }
            
                    const img = document.createElement('img');
                    img.style.maxWidth = '90%';
                    img.style.maxHeight = '90%';
                    img.style.borderRadius = '12px';
                    img.style.objectFit = 'contain';
            
                    img.onload = () => {
                        if (loader.parentNode) loader.remove();
                        overlay.appendChild(img);
                    };
                    img.onerror = () => {
                        loader.innerText = '加载失败';
                        setTimeout(() => overlay.remove(), 1000);
                    };
                    img.src = realUrl;
                } catch (err) {
                    loader.innerText = '加载失败';
                    setTimeout(() => overlay.remove(), 1000);
                }
            
                overlay.addEventListener('click', () => overlay.remove());
            }

            function sendLetter(content, targetMemberId = null) {
                if (!content || content.trim().length === 0) {
                    alert("请填写信件内容");
                    return false;
                }
                const delay = 2 + Math.random() * 6;
                const due = Date.now() + delay * 3600 * 1000;
                const nl = {
                    id: Date.now() + Math.random(),
                    sendTime: Date.now(),
                    textContent: content.trim(),      
                    sentences: [],                     
                    dueTime: due,
                    status: 'pending',
                    replyMessages: null,
                    replyTime: null,
                    targetMemberId: targetMemberId,
                    version: 2                         
                };
                letters.push(nl);
                saveLetters();
                const targetName = targetMemberId ? (groupMembers.find(m => m.id === targetMemberId)?.name || 'ta') : (profile.mengNick || 'ta');
                alert(`💌 信已寄给 ${targetName}！预计 ${delay.toFixed(1)} 小时后回信`);
                processAllPendingLetters();
                return true;
            }

                    letterContentHtml = `<div style="white-space: pre-wrap; line-height:1.8;">${escapeHtml(letter.textContent)}</div>`;
                } else if (letter.sentences && letter.sentences.length) {
                    letterContentHtml = letter.sentences.map(s =>
                        `<div style="margin-bottom:12px;line-height:1.8;white-space:pre-wrap;">${escapeHtml(s)}</div>`
                    ).join('');
                }
                
                let replyHtml = '';
                if (letter.status === 'completed' && letter.replyMessages?.length) {
                    const allTexts = letter.replyMessages.filter(r => r.type === 'text').map(r => r.content).join(' ');
                    let replyContentHtml = allTexts ? `<div style="line-height:1.8;">${escapeHtml(allTexts)}</div>` : '<div>💌 对方未回复文字内容</div>';
                    replyHtml = `
                        <div class="reply-card">
                            ${replyContentHtml}
                        </div>
                    `;
                } else {
                    const remainMs = letter.dueTime - Date.now();
                    const remainHours = Math.max(0, remainMs / (1000 * 3600)).toFixed(1);
                    replyHtml = `
                        <div class="data-note" style="margin-top:20px; text-align:center;">

                } else {
                    targetInfo = `<div class="letter-meta to"><i class="fa-regular fa-envelope-open"></i> 致 · ${escapeHtml(profile.mengNick || 'ta')}</div>`;
                }
                
                modal.innerHTML = `

            const PUNCTUATIONS = ['。', '，', '？', '！', '、', '…'];          
           
            function addRandomPunctuation(text) {
                if (!text || typeof text !== 'string') return text;
                const trimmed = text.trim();
                if (trimmed.length === 0) return text;
                const lastChar = trimmed.slice(-1);
                if (PUNCTUATIONS.includes(lastChar)) {
                    return text;               
                }
                const randomPunc = PUNCTUATIONS[Math.floor(Math.random() * PUNCTUATIONS.length)];
                return text + randomPunc;
            }
            
            function generateReplyMessages(member = null, letterSentences = []) {
                let textPool = member ? getMemberEffectiveTextPool(member) : wordCardList;
                const pool = [];
                if (textPool.length > 0) pool.push(...textPool.map(t => ({ type: 'text', val: t })));
                if (!emojiDisabled && emojiCardList.length > 0) pool.push(...emojiCardList.map(e => ({ type: 'text', val: e })));
                if (pool.length === 0) return [{ type: 'text', content: "💌 你的信我收到了。" }];
                
                const allText = Array.isArray(letterSentences) ? letterSentences.join(' ') : (letterSentences || '');
                const words_arr = allText.replace(/[，。！？、；：\s]/g, '').split('').filter(c => c.length > 0);
                const keywords = words_arr.filter((c, i) => i < 10);
                const matchedReplies = [];
                if (keywords.length > 0) {
                    textPool.forEach(item => {
                        if (keywords.some(kw => item.includes(kw))) {
                            matchedReplies.push(item);
                        }
                    });
                }
                const useMatched = matchedReplies.length > 0 && Math.random() < 0.3;
                const cnt = Math.floor(Math.random() * 8) + 8;
                const res = [];
                
                if (useMatched) {
                    const matchedCount = Math.min(3, matchedReplies.length, cnt);
                    for (let i = 0; i < matchedCount; i++) {
                        let replyContent = matchedReplies[i % matchedReplies.length];
                        replyContent = addRandomPunctuation(replyContent);  
                        res.push({ type: 'text', content: replyContent, senderName: member ? member.name : (profile.mengNick || 'ta') });
                    }
                }
                
                for (let i = res.length; i < cnt; i++) {
                    const r = pool[Math.floor(Math.random() * pool.length)];
                    let finalContent = r.val;
                    if (r.type === 'text') {
                        finalContent = addRandomPunctuation(finalContent);  
                    }
                    res.push({ type: r.type, content: finalContent });
                }
                return res;
            }

            let audioInitialized = false;   

            function initAudioPlayer() {
                if (audioInitialized) return;   
                if (!audioPlayer) {
                    audioPlayer = new Audio();
                }
                              
                audioPlayer.addEventListener('timeupdate', updateProgressUI);
                audioPlayer.addEventListener('loadedmetadata', () => {
                    updateDurationUI();

                    if (ps && audioPlayer.duration && isFinite(audioPlayer.duration)) {
                        ps.max = audioPlayer.duration;
                    }
                    updateProgressUI();
                    audioRetryCount = 0;
                });
                audioPlayer.addEventListener('ended', handleSongEnd);
                
                audioPlayer.addEventListener('waiting', () => {
                    if (audioStallTimer) clearTimeout(audioStallTimer);
                    const titleEl = document.getElementById('musicTitle');
                    if (titleEl && musicList[currentMusicIndex]) {
                        titleEl.innerText = musicList[currentMusicIndex].name + ' (缓冲中...)';
                    }

                });
                
                audioPlayer.addEventListener('stalled', () => {
                    if (audioStallTimer) clearTimeout(audioStallTimer);
                    const titleEl = document.getElementById('musicTitle');
                    if (titleEl && musicList[currentMusicIndex]) {
                        titleEl.innerText = musicList[currentMusicIndex].name + ' (连接中断...)';

                    console.error('音频播放错误', e);
                    // ... 原有错误处理（保持不变）
                };
                
                audioInitialized = true;   
                applyLoopByMode();
            }
            
            function handleAudioStall() {
                if (isRecoveringFromStall) return;
                if (!audioPlayer || !musicList.length) return;
                if (audioPlayer.readyState === 4) {
                    if (audioPlayer.paused) {
                        audioPlayer.play().catch(e => console.warn('恢复播放失败', e));
                    }
                    return;
                }
                isRecoveringFromStall = true;
                
                const currentSong = musicList[currentMusicIndex];
                if (!currentSong) return;
                
                const wasPlaying = !audioPlayer.paused;
                const currentTime = audioPlayer.currentTime || 0;
                
                audioPlayer.src = currentSong.url;
                audioPlayer.load();
                audioPlayer.addEventListener('canplay', function onCanPlay() {
                    audioPlayer.removeEventListener('canplay', onCanPlay);
                    if (currentTime > 0 && isFinite(currentTime)) {
                        audioPlayer.currentTime = currentTime;
                    }
                    if (wasPlaying) {
                        audioPlayer.play()
                            .then(() => updatePlayPauseButton(true))
                            .catch(e => {
                                console.warn('卡顿恢复播放失败', e);
                                updatePlayPauseButton(false);
                            });
                    }
                    isRecoveringFromStall = false;
                    const titleEl = document.getElementById('musicTitle');
                    if (titleEl && musicList[currentMusicIndex]) {
                        titleEl.innerText = musicList[currentMusicIndex].name;
                    }
                });
                
                setTimeout(() => {
                    if (isRecoveringFromStall) {
                        console.warn('重新加载超时，切换到下一首');
                        isRecoveringFromStall = false;
                        if (musicList.length > 1) {
                            const nextIndex = getNextMusicIndex();
                            if (nextIndex !== currentMusicIndex) {
                                playMusic(nextIndex);
                            }
                        } else {
                            playMusic(currentMusicIndex, true);
                        }
                    }
                }, 4000);
            }
            
            function playMusic(index, isRetry = false) {
                if (!musicList.length) return;
                currentMusicIndex = Math.max(0, Math.min(index, musicList.length - 1));
                localStorage.setItem(STORAGE.currentMusicIndex, currentMusicIndex);
                const song = musicList[currentMusicIndex];
                if (!song?.url) return;
                
                if (audioStallTimer) clearTimeout(audioStallTimer);
                if (!isRetry) audioRetryCount = 0;  
                isRecoveringFromStall = false;
                
                initAudioPlayer();
                
                const titleEl = document.getElementById('musicTitle');
                if (titleEl) titleEl.innerText = song.name + ' (加载中...)';
                
                audioPlayer.src = song.url;
                audioPlayer.load();
                
                let loadTimeout = setTimeout(() => {
                    if (audioPlayer.readyState < 2) {
                        console.warn('音频加载超时');
                        if (audioRetryCount < MAX_RETRY_PER_SONG) {
                            audioRetryCount++;
                            playMusic(currentMusicIndex, true);
                        } else if (musicList.length > 1) {
                            audioRetryCount = 0;
                            playMusic(getNextMusicIndex());
                        } else {
                            if (titleEl) titleEl.innerText = song.name + ' (加载失败)';
                            updatePlayPauseButton(false);
                        }
                    }
                }, 8000);
                
              
                if (audioPlayer._canplayHandler) {
                    audioPlayer.removeEventListener('canplay', audioPlayer._canplayHandler);
                }
         
                const handler = () => {
                    clearTimeout(loadTimeout);
                    if (titleEl) titleEl.innerText = song.name;
                    audioPlayer.play()
                        .then(() => {
                            updatePlayPauseButton(true);
                        })
                        .catch(err => {
                            console.warn('播放失败', err);
                            updatePlayPauseButton(false);
                            if (audioRetryCount < MAX_RETRY_PER_SONG) {
                                audioRetryCount++;
                                setTimeout(() => playMusic(currentMusicIndex, true), 1000);
                            }
                        });
                    audioPlayer.removeEventListener('canplay', handler);
                };
                audioPlayer._canplayHandler = handler;
                audioPlayer.addEventListener('canplay', handler, { once: true });
                
                updateProgressUI();
                applyLoopByMode();
            }

                '很少', '从不', '什么', '怎么', '怎样', '哪', '哪里', '谁', '为什么', '多少', '几', '一个', '没有', '不是', '不能', '不会', '不可以',
                '觉得', '知道', '想', '说', '看', '来', '去', '做', '让', '把', '被', '给', '对', '从', '到', '上', '下', '中', '里', '外', '前', '后'
            ]);
            
            function analyzeWordFrequency(senderFilter, topN = 10) {
                const wordCount = new Map();
                const targetMessages = messages.filter(m => {
                    if (m.type !== 'text') return false;
                    if (senderFilter === 'me') return m.sender === 'me';
                    if (senderFilter === 'other') return m.sender !== 'me';
                    return m.sender === senderFilter;
                });
                targetMessages.forEach(msg => {
                    const text = (msg.content || '').trim();
                    if (!text) return;
                    const segments = text.split(/[，。！？、；：\s,\.!\?;:]+/);
                    segments.forEach(seg => {
                        if (!seg || seg.length < 2) return;
                        const chars = Array.from(seg);
                        const len = chars.length;
                        for (let i = 0; i <= len - 2; i++) {
                            const bigram = chars[i] + chars[i + 1];
                            if (!STOP_WORDS.has(bigram) && !/^\d+$/.test(bigram)) {
                                wordCount.set(bigram, (wordCount.get(bigram) || 0) + 1);
                            }
                        }
                        for (let i = 0; i <= len - 3; i++) {
                            const trigram = chars[i] + chars[i + 1] + chars[i + 2];
                            if (!/^\d+$/.test(trigram)) {
                                wordCount.set(trigram, (wordCount.get(trigram) || 0) + 1);
                            }
                        }
                    });
                });
                const sorted = [...wordCount.entries()].sort((a, b) => b[1] - a[1]).slice(0, topN);
                return { totalMessages: targetMessages.length, uniqueWords: wordCount.size, topWords: sorted };
            }

            function analyzeWordCardFrequency(senderFilter, topN = 10) {
                let targetSentences = [];
                if (groupChatEnabled && senderFilter !== 'other' && senderFilter !== 'me') {
                    const member = groupMembers.find(m => m.id === senderFilter);
                    if (member) { targetSentences = getMemberEffectiveTextPool(member); }
                }
                if (targetSentences.length === 0) { targetSentences = [...wordCardList]; }
                const targetMessages = messages.filter(m => {
                    if (m.type !== 'text') return false;
                    if (senderFilter === 'me') return m.sender === 'me';
                    if (senderFilter === 'other') return m.sender !== 'me' && m.sender !== 'system';
                    return m.sender === senderFilter;
                });
                const freqMap = new Map();
                targetSentences.forEach(s => freqMap.set(s, 0));
                targetMessages.forEach(msg => {
                    const text = msg.content || '';
                    targetSentences.forEach(sentence => {
                        if (text.includes(sentence)) {
                            freqMap.set(sentence, (freqMap.get(sentence) || 0) + 1);
                        }
                    });
                });
                const sorted = [...freqMap.entries()].filter(([_, count]) => count > 0).sort((a, b) => b[1] - a[1]);
                const top = sorted.slice(0, topN);  
                return { totalMessages: targetMessages.length, uniqueWords: sorted.length, topWords: top };
            }

            function isPureEmojiLine(line) { const trimmed = line.trim(); if (!trimmed) return false; const emojiPattern =
                    /^(\p{Extended_Pictographic}|\p{Emoji_Component}|\s|[\u200D\uFE0F])+$/u; const symbolOnly =
                    /^[^\p{L}\p{N}]+$/u; return emojiPattern.test(trimmed) || symbolOnly.test(trimmed); }

            function extractAllStrings(obj) { const results = []; if (typeof obj === 'string') { results.push(obj); } else if (Array
                    .isArray(obj)) { for (const item of obj) { results.push(...extractAllStrings(item)); } } else if (obj && typeof obj ===
                    'object') { for (const val of Object.values(obj)) { results.push(...extractAllStrings(val)); } } return results; }

            function cleanLineQuotes(line) { let str = line.trim(); while (str.length >= 2) { const first = str[0]; const last = str[
                        str.length - 1]; const isDoubleQuote = (first === '"' && last === '"'); const isSingleQuote = (first === "'" &&
                        last === "'"); const isLeftRightQuote = (first === '“' && last === '”'); if (isDoubleQuote || isSingleQuote ||
                        isLeftRightQuote) { str = str.slice(1, -1).trim(); } else { break; } } return str; }

            function importAndAutoClassify(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    let lines = [];
                    if (file.name.endsWith('.json')) {
                        try {
                            const parsed = JSON.parse(e.target.result);
                            const candidates = extractAllStrings(parsed);
                            lines = candidates.map(s => cleanLineQuotes(s).trim()).filter(l => l);
                        } catch (err) {
                            alert('JSON解析失败');
                            return;
                        }
                    } else {
                        lines = e.target.result.split(/\r?\n/).map(l => cleanLineQuotes(l).trim()).filter(l => l);
                    }
            
                    const words_arr = [], emojis_arr = [];
                    lines.forEach(clean => {
                        if (isPureEmojiLine(clean)) emojis_arr.push(clean);
                        else words_arr.push(clean);
                    });
            
                    const uniqueNewWords = [];
                    const existingWordSet = new Set(wordCardList);
                    for (const w of words_arr) {
                        if (!existingWordSet.has(w) && !uniqueNewWords.includes(w)) {
                            uniqueNewWords.push(w);
                        }
                    }
                    const uniqueNewEmojis = [];
                    const existingEmojiSet = new Set(emojiCardList);
                    for (const e of emojis_arr) {
                        if (!existingEmojiSet.has(e) && !uniqueNewEmojis.includes(e)) {
                            uniqueNewEmojis.push(e);
                        }
                    }
            
                    let addedWords = 0, addedEmojis = 0;
                    if (uniqueNewWords.length) {
                        wordCardList.push(...uniqueNewWords);
                        saveWordCards();
                        addedWords = uniqueNewWords.length;
                    }
                    if (uniqueNewEmojis.length) {
                        emojiCardList.push(...uniqueNewEmojis);
                        saveEmojiCards();
                        addedEmojis = uniqueNewEmojis.length;
                    }
            
                    alert(`✅ 导入完成\n📝 字卡 +${addedWords} 条（去重后）\n😊 表情 +${addedEmojis} 条（去重后）`);
            
                    const wordArea = document.getElementById('wordTextarea');
                    if (wordArea) wordArea.value = wordCardList.join('\n');
                    const emojiArea = document.getElementById('emojiTextarea');
                    if (emojiArea) emojiArea.value = emojiCardList.join('\n');
                    const countEl = document.getElementById('wordCountDisplay');
                    if (countEl) countEl.innerHTML = `📝 当前 ${wordCardList.length} 条`;
                };
                reader.readAsText(file);
            }

            /* ========== 通话悬浮窗拖动 ========== */
            let isMiniDragging = false,
                miniDragMoved = false,
                miniDragStartX, miniDragStartY, miniStartLeft, miniStartTop;
            let rafId = null;  
            const callMiniWindowEl = document.getElementById('callMiniWindow');
            if (callMiniWindowEl) {
                callMiniWindowEl.addEventListener('pointerdown', function(e) {
                    if (e.target === document.getElementById('callMiniHangup') || document.getElementById(
                            'callMiniHangup')?.contains(e.target)) return;
                    isMiniDragging = true;
                    miniDragMoved = false;
                    callMiniWindowEl.style.willChange = 'transform';
                    callMiniWindowEl.style.transition = 'none';
                    const rect = callMiniWindowEl.getBoundingClientRect();
                    miniDragStartX = e.clientX;
                    miniDragStartY = e.clientY;
                    miniStartLeft = rect.left;
                    miniStartTop = rect.top;
                    callMiniWindowEl.style.right = 'auto';
                    callMiniWindowEl.style.bottom = 'auto';
                    callMiniWindowEl.style.left = miniStartLeft + 'px';
                    callMiniWindowEl.style.top = miniStartTop + 'px';
                    callMiniWindowEl.style.transform = 'translate(0px, 0px)';
                    callMiniWindowEl.setPointerCapture(e.pointerId);
                });
                window.addEventListener('pointermove', function(e) {
                    if (!isMiniDragging) return;
                    e.preventDefault();                        
                
                    if (rafId) cancelAnimationFrame(rafId);
                    rafId = requestAnimationFrame(() => {
                        const dx = e.clientX - miniDragStartX;
                        const dy = e.clientY - miniDragStartY;
                
                        if (Math.abs(dx) > 6 || Math.abs(dy) > 6) {
                            miniDragMoved = true;
                        }
                        callMiniWindowEl.style.transform = `translate(${dx}px, ${dy}px)`;
                    });
                });
                window.addEventListener('pointerup', function(e) {
                    if (!isMiniDragging) return;
                    isMiniDragging = false;
                
                    if (rafId) {
                        cancelAnimationFrame(rafId);
                        rafId = null;
                    }
                
                    callMiniWindowEl.style.willChange = 'auto';
                    callMiniWindowEl.style.transition = 'box-shadow 0.2s ease, transform 0.2s ease';
                
                    const finalLeft = miniStartLeft + (e.clientX - miniDragStartX);
                    const finalTop = miniStartTop + (e.clientY - miniDragStartY);
                    const miniWidth = callMiniWindowEl.offsetWidth;
                    const miniHeight = callMiniWindowEl.offsetHeight;
                    const clampedLeft = Math.max(4, Math.min(finalLeft, window.innerWidth - miniWidth - 4));
                    const clampedTop = Math.max(40, Math.min(finalTop, window.innerHeight - miniHeight - 20));
                
                    if (!miniDragMoved) {
                        callMiniWindowEl.style.transition = 'transform 0.2s cubic-bezier(0.4, 0, 0.2, 1)';
                        callMiniWindowEl.style.transform = 'scale(0.9)';
                        setTimeout(() => {
                            callMiniWindowEl.style.transform = 'scale(1)';
                            restoreCallFromMini();
                        }, 150);
                    } else {
                        callMiniWindowEl.style.transition = 'left 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.2), top 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.2)';
                        callMiniWindowEl.style.left = clampedLeft + 'px';
                        callMiniWindowEl.style.top = clampedTop + 'px';
                        callMiniWindowEl.style.transform = 'translate(0px, 0px)';
                    }
                
                    callMiniWindowEl.releasePointerCapture(e.pointerId);
                });
            }

            async function exportChatMessages() {
                if (!messages.length) { alert('暂无对话'); return; }
                
                const imgIdSet = new Set();
                messages.forEach(msg => {
                    if (msg.type === 'image' && isImgIdRef(msg.content)) {
                        const id = extractImgId(msg.content);
                        if (id) imgIdSet.add(id);
                    }
                });
                   
                const imagesMap = {};
                for (const id of imgIdSet) {
                    const base64 = await getImageFromDB(id);
                    if (base64) imagesMap[id] = base64;
                }
                
                const exportData = {
                    version: "3.0",
                    type: "chat_messages_with_images",
                    exportTime: new Date().toISOString(),
                    messageCount: messages.length,
                    messages: messages,
                    images: imagesMap
                };
                
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `chat_with_images_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.json`;
                a.click();
                setTimeout(() => URL.revokeObjectURL(a.href), 5000);
                alert(`✅ 已导出 ${messages.length} 条消息及 ${Object.keys(imagesMap).length} 张图片`);
            }

            function importChatMessages() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                input.onchange = async (e) => {
                    const f = e.target.files[0];
                    if (!f) return;
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        try {
                            const data = JSON.parse(ev.target.result);
                            let importedMessages = data.messages || data;
                            if (data.images && typeof data.images === 'object') {
                                for (const [imgId, base64] of Object.entries(data.images)) {
                                    if (base64 && base64.startsWith('data:')) {
                                        await saveImageToDB(imgId, base64);
                                        avatarCache.set(IMG_ID_PREFIX + imgId, base64);
                                    }
                                }
                            }
                            if (confirm(`检测到 ${importedMessages.length} 条\n确定=合并 取消=替换`)) {
                            } else {
                                messages = importedMessages;
                            }
                            saveMessagesImmediately();
                            renderMessages();
                        } catch (err) { alert('导入失败：' + err.message); }
                    };
                    reader.readAsText(f);
                };
                input.click();
            }

            function importMemberWordsFromFile(file, memberId) {

                        try {
                            const parsed = JSON.parse(e.target.result);
                            lines = extractAllStrings(parsed).map(s => cleanLineQuotes(s).trim()).filter(l => l);
                        } catch (err) {
                            alert('JSON解析失败');
                            return;
                        }

                        lines = e.target.result.split(/\r?\n/).map(l => cleanLineQuotes(l).trim()).filter(l => l);
                    }
            
                    const member = groupMembers.find(m => m.id === memberId);
                    if (!member) return;
            
                    const existingSet = new Set(member.wordCardList);
                    const uniqueNewLines = [];
                    for (const line of lines) {
                        if (!existingSet.has(line) && !uniqueNewLines.includes(line)) {
                            uniqueNewLines.push(line);
                            existingSet.add(line); 
                        }
                    }
            
                    if (uniqueNewLines.length === 0) {
                        alert(`⚠️ 没有新增的不重复字卡（所有导入句子都已存在）`);
                        return;

                    member.wordCardList.push(...uniqueNewLines);

                    alert(`✅ 已为 ${member.name} 导入 ${uniqueNewLines.length} 条独立字卡（去重后）`);

                            `rgba(${170+Math.random()*50},${130+Math.random()*40},${210+Math.random()*35},${0.35+Math.random()*0.55})`;
                        dot.style.boxShadow =
                            `0 0 ${4+Math.random()*8}px rgba(${170+Math.random()*40},${135+Math.random()*30},${210+Math.random()*30},${0.4+Math.random()*0.5})`;
                        frag.appendChild(dot); }
                    pc.appendChild(frag); }
                updateCallUI();
                    var overlay = document.getElementById('callOverlay');
                    if (overlay) {
                        overlay.style.display = 'none';
                        overlay.classList.add('hidden');
                    }
                    var mini = document.getElementById('callMiniWindow');
                    if (mini) {
                        mini.style.display = 'none';
                        mini.classList.add('hidden');
                    }
                lastOnlineTime = parseFloat(localStorage.getItem('xiayi_lastOnlineTime') || '0');
                updateLastOnlineTime();
                generateOfflineMomentsIfNeeded(); 
            };
            window.addEventListener('beforeunload', () => { updateLastOnlineTime(); });
        })();
    </script>
</body>
